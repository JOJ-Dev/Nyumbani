<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% load static %}
  {% load bootstrap5 %}
  {% bootstrap_css %}
  {% bootstrap_javascript %}
  <link rel="stylesheet" href="{% static 'css/index.css'%}">
  <title>Nyumbani - Apartment Management System for landlords</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-0 py-3">
      <div class="container-xl">
        <!-- Logo -->
        <a class="navbar-brand" href="#">
          <img src="{% static 'images/logo.svg' %}" class="h-8" alt="...">
          <span style="font-family: 'Courier New', Courier, monospace;font-size: larger;">Nyumbani</span>
        </a>
        <!-- Navbar toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <!-- Collapse -->
        <div class="collapse navbar-collapse" id="navbarCollapse">
          <!-- Nav -->
          <div class="navbar-nav mx-lg-auto">
            <a class="nav-item nav-link active" href="#" aria-current="page">Home</a>
            <a class="nav-item nav-link" href="#">Product</a>
            <a class="nav-item nav-link" href="#">Features</a>
            <a class="nav-item nav-link" href="#">Pricing</a>
          </div>
          {% if user.is_authenticated %}
          <h1>{{user.username}}</h1>
          {% else %}
          <!-- Right navigation -->
          <div class="navbar-nav ms-lg-4">
            <a class="nav-item nav-link" href="#">Sign in</a>
          </div>
          <!-- Action -->
          <div class="d-flex align-items-lg-center mt-3 mt-lg-0">
            <a href="#" class="btn btn-sm btn-primary w-full w-lg-auto">
              Register
            </a>
          </div>
          {% endif %}
        </div>
      </div>
    </nav>
<!-- full screen scrolling
nyumbani app -->

<div class="container">
  <div class="slides">
      <img src="{% static 'images/slide1.jpeg' %}" alt="...">

  </div>

  <div class="slides">
      <img src="{% static 'images/slide1.jpeg' %}" alt="...">
  </div>

  <div class="slides">
      <img src="{% static 'images/slide1.jpeg' %}" alt="...">
  </div>
</div>



</body>
</html>
